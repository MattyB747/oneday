<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>Tempo</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <!-- ===== Setup — one question ===== -->
  <section class="screen on" id="setup">
    <div class="setupCard">
      <div class="logo">Tem<span>po</span></div>
      <p class="tagline">Cape Town — what's on, at exactly the right time, for you.</p>
      <h1>Where are you staying?</h1>
      <button class="locBtn" id="useLocation">📍 Use my current location</button>
      <div class="or">or</div>
      <input class="inp" id="stayInput" type="text" placeholder="Hotel, suburb or address" autocomplete="off" />
      <button class="cta" id="goBtn">Show me Cape Town →</button>
    </div>
  </section>

  <!-- ===== Dashboard — rolling daily briefing ===== -->
  <section class="screen" id="dash">
    <header class="dashHead">
      <div class="brandRow"><span class="logo sm">Tem<span>po</span></span></div>
      <div class="stay" id="stayLabel">Cape Town</div>
    </header>

    <div class="daysBar"><h2>Your days</h2></div>
    <div class="carousel" id="dayCarousel"></div>

    <div class="planBar">
      <button class="cta" id="planBtn">✦ Plan a Trippie</button>
    </div>
  </section>

  <div id="toast"></div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
