<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>Best Day</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <!-- ===== Setup — one question ===== -->
  <section class="screen on" id="setup">
    <div class="setupCard">
      <div class="logo">Best<span>Day</span></div>
      <p class="tagline">Make every day unforgettable.</p>
      <h1>Where are you staying?</h1>
      <button class="locBtn" id="useLocation">📍 Use my current location</button>
      <div class="or">or</div>
      <input class="inp" id="stayInput" type="text" placeholder="Hotel, suburb or address" autocomplete="off" />
      <button class="cta" id="goBtn">Show me Cape Town →</button>
    </div>
  </section>

  <!-- ===== Dashboard — rolling daily briefing ===== -->
  <section class="screen" id="dash">
    <header class="dashHead">
      <div class="brandRow"><span class="logo sm">Best<span>Day</span></span></div>
      <div class="stay" id="stayLabel">Cape Town</div>
    </header>

    <div class="daysBar"><h2>Your days</h2></div>
    <div class="carousel" id="dayCarousel"></div>

    <div class="planBar">
      <button class="cta" id="planBtn">✦ Plan a Trippie</button>
    </div>
  </section>

  <!-- ===== Plan a Trippie (basket picker) ===== -->
  <section class="screen" id="planner">
    <header class="dashHead">
      <button class="backBtn" id="planBack" type="button">‹</button>
      <div class="brandRow"><span class="logo sm">Plan a Trippie</span></div>
    </header>
    <div class="planScroll">
      <h3 class="pLbl">How many days?</h3>
      <div class="daysPick" id="daysPick"></div>
      <h3 class="pLbl">What do you want to do? <span id="basketCount">0 chosen</span></h3>
      <div class="libGrid" id="libGrid"></div>
    </div>
    <div class="planBar">
      <button class="cta" id="buildTrippie" disabled>Build my Trippie</button>
    </div>
  </section>

  <!-- ===== Itinerary (the built Trippie) ===== -->
  <section class="screen" id="itinerary">
    <header class="dashHead">
      <button class="backBtn" id="itinBack" type="button">‹</button>
      <div class="brandRow"><span class="logo sm">Your Trippie</span></div>
    </header>
    <div class="itinScroll" id="itinScroll"></div>
  </section>

  <div id="toast"></div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
