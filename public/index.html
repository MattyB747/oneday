<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>Tempo</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <!-- ===== Setup (4 questions) ===== -->
  <section class="screen on" id="setup">
    <header class="setupHead">
      <div class="logo sm">Tem<span>po</span></div>
      <div class="dots" id="dots"></div>
    </header>

    <div class="step on" data-step="0">
      <h1>Who's going?</h1>
      <div class="opts" id="q-people">
        <button class="opt" data-val="1">Just me</button>
        <button class="opt" data-val="2">Two of us</button>
        <button class="opt" data-val="family">Family</button>
        <button class="opt" data-val="group">Group</button>
      </div>
    </div>

    <div class="step" data-step="1">
      <h1>How many days in Cape Town?</h1>
      <div class="opts grid" id="q-days">
        <button class="opt" data-val="1">1</button>
        <button class="opt" data-val="2">2</button>
        <button class="opt" data-val="3">3</button>
        <button class="opt" data-val="4">4</button>
        <button class="opt" data-val="5">5</button>
        <button class="opt" data-val="7">7+</button>
      </div>
    </div>

    <div class="step" data-step="2">
      <h1>Where are you staying?</h1>
      <button class="opt locBtn" id="useLocation">📍 Use my current location</button>
      <div class="or">or</div>
      <input class="inp" id="stayInput" type="text" placeholder="Hotel, suburb or address" autocomplete="off" />
      <button class="next" id="stayNext">Continue</button>
    </div>

    <div class="step" data-step="3">
      <h1>When do you arrive?</h1>
      <label class="fieldLbl">Date</label>
      <input class="inp" id="arriveDate" type="date" />
      <label class="fieldLbl">Arrival time <span>(optional)</span></label>
      <input class="inp" id="arriveTime" type="time" />
      <button class="next" id="buildBtn">Plan my trip →</button>
    </div>
  </section>

  <!-- ===== Working / result summary ===== -->
  <section class="screen" id="result">
    <div class="working" id="working">
      <div class="spinner"></div>
      <p id="workingMsg">Reading the weather, tides and what's on…</p>
    </div>
    <div class="summary" id="summary" hidden>
      <div class="logo sm">Tem<span>po</span></div>
      <h1 id="summaryTitle">Here's your Cape Town</h1>
      <p class="sub" id="stayLine"></p>
      <div class="wxDays" id="wxDays"></div>
      <p class="note">Live weather now. Next: swipe a few places you love and I'll build your day-by-day plan.</p>
      <button class="next" id="toDiscover" disabled>Start discovering (next step)</button>
    </div>
  </section>

  <div id="toast"></div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
